services:
  - type: web
    name: l-spa-api
    rootDir: .
    env: bun
    region: oregon
    plan: free
    buildCommand: bun install && bun run --filter @l-spa/backend build
    startCommand: bun run --filter @l-spa/backend start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
